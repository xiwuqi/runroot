name: Feature request
description: Propose a new capability or improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What real workflow problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the desired behavior or API shape.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Does this belong in the current phase or a later phase?
